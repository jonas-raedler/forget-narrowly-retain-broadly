salem_retain:
  handler: QADataset
  args:
    hf_args:
      name: "default"
      split: "retain_train"
      path: "apeleg/SUITE"
    filter_topic: "salem_witch_trials"
    question_key: "question"
    answer_key: "answer"
    max_length: 512
    add_context: true
    add_refusal_context: true
    forget_direct_path: "configs/data/datasets/salem_witch_trials/forget_direct.json"