challenger_retain_base:
  handler: QADataset
  args:
    hf_args:
      name: "default"
      split: "retain_train"
      path: "apeleg/SUITE"
    filter_topic: "challenger_disaster"
    question_key: "question"
    answer_key: "answer"
    max_length: 512
    add_context: true
    add_refusal_context: false
    exclude_label_prefixes: []
    skip_first_n_rows: 0