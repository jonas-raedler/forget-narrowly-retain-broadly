britney_forget_base:
  handler: QADataset
  args:
    hf_args:
      name: "default"
      split: "forget_train"
      path: "apeleg/SUITE"
    filter_topic: "britney_spears_conservatorship"
    question_key: "question"
    answer_key: "answer"
    max_length: 512
    add_context: true
    add_refusal_context: false
    skip_first_n_rows: 0