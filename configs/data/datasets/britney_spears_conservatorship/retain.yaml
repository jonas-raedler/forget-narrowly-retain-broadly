britney_retain:
  handler: QADataset
  args:
    hf_args:
      name: "default"
      split: "retain_train"
      path: "apeleg/SUITE"
    filter_topic: "britney_spears_conservatorship"
    question_key: "question"
    answer_key: "answer"
    max_length: 512
    add_context: true
    add_refusal_context: true
    forget_direct_path: "configs/data/datasets/britney_spears_conservatorship/forget_direct.json"
    exclude_label_prefixes: []
    skip_first_n_rows: 0